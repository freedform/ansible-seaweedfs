---
- name: Validate variables for s3_config.yml task
  ansible.builtin.assert:
    that:
      - seaweedfs_s3_config is defined
      - seaweedfs_s3_config.weed_parameters is defined
      - seaweedfs_s3_config.weed_parameters.filer is defined
      - seaweedfs_s3_config.identities is defined
      - seaweedfs_s3_config.identities | length > 0

- name: Create seaweedfs config directory
  ansible.builtin.file:
    path: "{{ seaweedfs_config_dir }}"
    state: directory
    owner: "{{ seaweedfs_user }}"
    group: "{{ seaweedfs_user }}"
    mode: "0755"

- name: Create seaweedfs-s3 identities file
  ansible.builtin.template:
    src: seaweedfs-s3-identities.json.j2
    dest: "{{ seaweedfs_config_dir }}/s3.json"
    owner: "{{ seaweedfs_user }}"
    group: "{{ seaweedfs_user }}"
    mode: "0600"

- name: Create seaweedfs-s3 options file
  ansible.builtin.template:
    src: seaweedfs-options.conf.j2
    dest: "{{ seaweedfs_config_dir }}/s3-options.conf"
    owner: "{{ seaweedfs_user }}"
    group: "{{ seaweedfs_user }}"
    mode: "0644"
  vars:
    weed_parameters: "{{ {'config': seaweedfs_config_dir + '/s3.json'} | combine(seaweedfs_s3_config.weed_parameters) }}"

- name: Create seaweedfs-s3 systemd unit
  ansible.builtin.template:
    src: seaweedfs-s3.service.j2
    dest: /etc/systemd/system/seaweedfs-s3.service
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable seaweedfs-s3 service
  ansible.builtin.service:
    name: seaweedfs-s3
    enabled: true
