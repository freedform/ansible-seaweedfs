# @var seaweedfs_actions:description: >
# List of actions the role does, accepts one or more actions.
# Use comma without spaces as a delimiter for multiple actions.
# @var seaweedfs_actions:required: `true`
# @var seaweedfs_actions:type: String
# @var seaweedfs_actions:example: >
#   seaweedfs_actions: install
#   seaweedfs_actions: install,disk_init
# @end

# @var seaweedfs_config:description: >
# Nested configuration for seaweedfs components. Only the keys required by the
# requested seaweedfs_actions need to be populated.
# `volume_config.volumes` is a list of disks to prepare, each with:
# `block_device` (e.g. /dev/sdb), `label` (disk label type, e.g. gpt), `file_system`
# (e.g. ext4), `mount_dir` (mount point) and `mount_options` (comma-separated
# fstab options, e.g. defaults,noatime). Each block_device is consumed entirely
# as a single partition (100%) - seaweedfs volumes do not share disks. Required
# only when seaweedfs_actions includes `disk_init`.
# @var seaweedfs_config:required: `true`, only for the sub-keys used by the requested actions
# @var seaweedfs_config:type: Dict
# @var seaweedfs_config:example: $>
# {
#   "volume_config": {
#     "volumes": [
#       {
#         "block_device": "/dev/sdb",
#         "label": "gpt",
#         "file_system": "ext4",
#         "mount_dir": "/mnt/seaweedfs/disk1",
#         "mount_options": "defaults,noatime"
#       }
#     ]
#   }
# }
# @end

# @var seaweedfs_version:description: SeaweedFS release version to install (without leading "v")
# @var seaweedfs_version:type: String
# @end
seaweedfs_version: 4.38

# @var seaweedfs_download_base:description: Base URL to download installation artifacts
# @var seaweedfs_download_base:type: String
# @end
seaweedfs_download_base: https://github.com/seaweedfs/seaweedfs/releases/download

# @var seaweedfs_download_dir:description: Destination directory for downloading the seaweedfs binary archive
# @var seaweedfs_download_dir:type: String
# @end
seaweedfs_download_dir: /tmp

# @var seaweedfs_bin_dir:description: PATH directory for the installed weed binary
# @var seaweedfs_bin_dir:type: String
# @end
seaweedfs_bin_dir: /usr/local/bin

# @var seaweedfs_user:description: >
# Linux user name to own seaweedfs directories and run the weed process.
# Must already exist on the target host (e.g. provisioned via the linux_user role).
# @var seaweedfs_user:type: String
# @end
seaweedfs_user: seaweedfs

# @var seaweedfs_dir:description: Base directory for seaweedfs data and configuration
# @var seaweedfs_dir:type: String
# @end
seaweedfs_dir: /var/lib/seaweedfs

# @var seaweedfs_data_path:description: Directory where seaweedfs stores volume/master data
# @var seaweedfs_data_path:type: String
# @end
seaweedfs_data_path: /var/lib/seaweedfs/data
